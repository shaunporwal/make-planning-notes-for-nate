name: Commit Summary Email

on:
  schedule:
    - cron: '0 9 * * 3'
  workflow_dispatch:

jobs:
  commit_summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.1"

      - name: Set up Python
        run: uv python install

      - name: Sync uv project dependencies
        run: uv sync

      - name: Determine if today is a scheduled fortnight
        if: github.event_name != 'workflow_dispatch'
        id: schedule_check
        shell: bash
        run: |
          ref_date="2025-02-19"
          current_date=$(date +%Y-%m-%d)
          diff_days=$(( ( $(date -d "$current_date" +%s) - $(date -d "$ref_date" +%s) ) / 86400 ))
          echo "Days difference: $diff_days"
          if (( diff_days % 14 != 0 )); then
            echo "This Wednesday ($current_date) is not scheduled for a summary. Skipping."
            exit 78
          fi
          echo "This is a scheduled day for the commit summary."

      - name: "Debug: Print Time Window and Environment Info"
        run: |
          echo "Current UTC Time: $(python -c 'import datetime, pytz; print(datetime.datetime.now(pytz.UTC))')"
          echo "Computed Start Date (2 weeks ago): $(python -c 'import datetime, pytz; from datetime import timedelta; print(datetime.datetime.now(pytz.UTC) - timedelta(weeks=2))')"
          echo "Allowed commit emails: shaun.porwal@gmail.com, porwals@mskcc.org"
          echo "Enterprise mode organizations: Amplio, Amplio-Projects"

      - name: "Debug: List Enterprise Repositories"
        env:
          ENTERPRISE_GH_URL: ${{ secrets.ENTERPRISE_GH_URL }}
          ENTERPRISE_GH_TOKEN: ${{ secrets.ENTERPRISE_GH_TOKEN }}
        run: |
          python -c "exec(\"from github import Github\\nimport os\\norgs = ['Amplio','Amplio-Projects']\\nprint('Enterprise GH URL:', os.getenv('ENTERPRISE_GH_URL'))\\ng = Github(base_url=os.getenv('ENTERPRISE_GH_URL'), login_or_token=os.getenv('ENTERPRISE_GH_TOKEN'))\\nfor org_name in orgs:\\n    try:\\n        org = g.get_organization(org_name)\\n        print('\\nRepositories in {}:'.format(org_name))\\n        for repo in org.get_repos():\\n            print('  ', repo.full_name)\\n    except Exception as e:\\n        print('Error fetching {}:'.format(org_name), e)\\n\")"

      - name: "Debug: List Recent Commits for Allowed Emails"
        env:
          ENTERPRISE_GH_URL: ${{ secrets.ENTERPRISE_GH_URL }}
          ENTERPRISE_GH_TOKEN: ${{ secrets.ENTERPRISE_GH_TOKEN }}
        run: |
          python -c "exec(\"from github import Github\\nimport os, datetime, pytz\\nallowed_emails = {'shaun.porwal@gmail.com', 'porwals@mskcc.org'}\\npast_delta = datetime.timedelta(weeks=2)\\nstart_date = datetime.datetime.now(pytz.UTC) - past_delta\\norgs = ['Amplio','Amplio-Projects']\\ng = Github(base_url=os.getenv('ENTERPRISE_GH_URL'), login_or_token=os.getenv('ENTERPRISE_GH_TOKEN'))\\nfor org_name in orgs:\\n    try:\\n        org = g.get_organization(org_name)\\n        print('\\nCommits in {} since {}:'.format(org_name, start_date))\\n        for repo in org.get_repos():\\n            try:\\n                commits = repo.get_commits(since=start_date)\\n                for commit in commits:\\n                    email = commit.commit.author.email.lower() if commit.commit.author.email else 'N/A'\\n                    if email in allowed_emails:\\n                        print('Repo: {} | Date: {} | Email: {}'.format(repo.full_name, commit.commit.author.date, email))\\n            except Exception as e:\\n                print('Error in repo {}:'.format(repo.full_name), e)\\n    except Exception as e:\\n        print('Error fetching {}:'.format(org_name), e)\\n\")"

      - name: Run commit summary script (verbose)
        env:
          PERSONAL_GH_TOKEN: ${{ secrets.PERSONAL_GH_TOKEN }}
          ENTERPRISE_GH_URL: ${{ secrets.ENTERPRISE_GH_URL }}
          ENTERPRISE_GH_TOKEN: ${{ secrets.ENTERPRISE_GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: uv run src/get_commit_summary.py -u porwals --enterprise -e porwals@mskcc.org -v
