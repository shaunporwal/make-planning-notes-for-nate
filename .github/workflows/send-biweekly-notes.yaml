name: Commit Summary Email

on:
  schedule:
    - cron: '0 9 * * 3'
  workflow_dispatch:

jobs:
  commit_summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.1"

      - name: Set up Python
        run: uv python install

      - name: Sync uv project dependencies
        run: uv sync

      - name: Determine if today is a scheduled fortnight
        if: github.event_name != 'workflow_dispatch'
        id: schedule_check
        shell: bash
        run: |
          ref_date="2025-02-19"
          current_date=$(date +%Y-%m-%d)
          diff_days=$(( ( $(date -d "$current_date" +%s) - $(date -d "$ref_date" +%s) ) / 86400 ))
          echo "Days difference: $diff_days"
          if (( diff_days % 14 != 0 )); then
            echo "This Wednesday ($current_date) is not scheduled for a summary. Skipping."
            exit 78
          fi
          echo "This is a scheduled day for the commit summary."

      - name: "Debug: Print Time Window and Environment Info"
        run: |
          echo "Current UTC Time: $(python -c 'import datetime, pytz; print(datetime.datetime.now(pytz.UTC))')"
          echo "Computed Start Date (2 weeks ago): $(python -c 'import datetime, pytz; from datetime import timedelta; print(datetime.datetime.now(pytz.UTC) - timedelta(weeks=2))')"
          echo "Allowed commit emails: shaun.porwal@gmail.com, porwals@mskcc.org"
          echo "Enterprise mode organizations: Amplio, Amplio-Projects"

      - name: "Debug: List Enterprise Repositories"
        env:
          ENTERPRISE_GH_URL: ${{ secrets.ENTERPRISE_GH_URL }}
          ENTERPRISE_GH_TOKEN: ${{ secrets.ENTERPRISE_GH_TOKEN }}
        run: |
          python <<'EOF'
from github import Github
import os
orgs = ['Amplio', 'Amplio-Projects']
print('Enterprise GH URL:', os.getenv('ENTERPRISE_GH_URL'))
g = Github(base_url=os.getenv('ENTERPRISE_GH_URL'), login_or_token=os.getenv('ENTERPRISE_GH_TOKEN'))
for org_name in orgs:
    try:
        org = g.get_organization(org_name)
        print(f'\nRepositories in {org_name}:')
        for repo in org.get_repos():
            print('  ', repo.full_name)
    except Exception as e:
        print(f'Error fetching {org_name}:', e)
EOF

      - name: "Debug: List Recent Commits for Allowed Emails"
        env:
          ENTERPRISE_GH_URL: ${{ secrets.ENTERPRISE_GH_URL }}
          ENTERPRISE_GH_TOKEN: ${{ secrets.ENTERPRISE_GH_TOKEN }}
        run: |
          python <<'EOF'
from github import Github
import os
import datetime, pytz
allowed_emails = { 'shaun.porwal@gmail.com', 'porwals@mskcc.org' }
past_delta = datetime.timedelta(weeks=2)
start_date = datetime.datetime.now(pytz.UTC) - past_delta
orgs = ['Amplio', 'Amplio-Projects']
g = Github(base_url=os.getenv('ENTERPRISE_GH_URL'), login_or_token=os.getenv('ENTERPRISE_GH_TOKEN'))
for org_name in orgs:
    try:
        org = g.get_organization(org_name)
        print(f'\nCommits in {org_name} since {start_date}:')
        for repo in org.get_repos():
            try:
                commits = repo.get_commits(since=start_date)
                for commit in commits:
                    email = commit.commit.author.email.lower() if commit.commit.author.email else 'N/A'
                    if email in allowed_emails:
                        print(f"Repo: {repo.full_name} | Date: {commit.commit.author.date} | Email: {email}")
            except Exception as e:
                print(f'Error in repo {repo.full_name}:', e)
    except Exception as e:
        print(f'Error fetching {org_name}:', e)
EOF

      - name: Run commit summary script (verbose)
        env:
          PERSONAL_GH_TOKEN: ${{ secrets.PERSONAL_GH_TOKEN }}
          ENTERPRISE_GH_URL: ${{ secrets.ENTERPRISE_GH_URL }}
          ENTERPRISE_GH_TOKEN: ${{ secrets.ENTERPRISE_GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: uv run src/get_commit_summary.py -u porwals --enterprise -e porwals@mskcc.org -v
