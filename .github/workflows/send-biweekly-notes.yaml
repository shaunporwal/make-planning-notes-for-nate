name: Commit Summary Email

on:
  schedule:
    - cron: '0 9 * * 3'
  workflow_dispatch:

jobs:
  commit_summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.1"

      - name: Set up Python
        run: uv python install

      - name: Sync uv project dependencies
        run: uv sync

      - name: Scheduled Check
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          ref_date="2025-02-19"
          current_date=$(date +%Y-%m-%d)
          diff_days=$(( ( $(date -d "$current_date" +%s) - $(date -d "$ref_date" +%s) ) / 86400 ))
          echo "Days difference: $diff_days"
          if (( diff_days % 14 != 0 )); then
            echo "Not scheduled."
            exit 78
          fi
          echo "Scheduled run."

      - name: Debug: Time Window
        run: |
          echo "UTC Time: $(python -c 'import datetime, pytz; print(datetime.datetime.now(pytz.UTC))')"
          echo "Start Date (2w ago): $(python -c 'import datetime, pytz; from datetime import timedelta; print(datetime.datetime.now(pytz.UTC) - timedelta(weeks=2))')"

      - name: Debug: List Repositories
        env:
          ENTERPRISE_GH_URL: ${{ secrets.ENTERPRISE_GH_URL }}
          ENTERPRISE_GH_TOKEN: ${{ secrets.ENTERPRISE_GH_TOKEN }}
        run: |
          cat <<'EOF' > list_repos.py
from github import Github
import os
g = Github(base_url=os.getenv("ENTERPRISE_GH_URL"), login_or_token=os.getenv("ENTERPRISE_GH_TOKEN"))
for org in ["Amplio", "Amplio-Projects"]:
    print("Org:", org)
    for repo in g.get_organization(org).get_repos():
        print(repo.full_name)
EOF
          python list_repos.py

      - name: Debug: List Commits
        env:
          ENTERPRISE_GH_URL: ${{ secrets.ENTERPRISE_GH_URL }}
          ENTERPRISE_GH_TOKEN: ${{ secrets.ENTERPRISE_GH_TOKEN }}
        run: |
          cat <<'EOF' > list_commits.py
from github import Github
import os, datetime, pytz
g = Github(base_url=os.getenv("ENTERPRISE_GH_URL"), login_or_token=os.getenv("ENTERPRISE_GH_TOKEN"))
start = datetime.datetime.now(pytz.UTC) - datetime.timedelta(weeks=2)
for org in ["Amplio", "Amplio-Projects"]:
    print("Commits in org:", org)
    for repo in g.get_organization(org).get_repos():
        try:
            for commit in repo.get_commits(since=start):
                print(repo.full_name, commit.commit.author.date, commit.commit.author.email)
        except Exception as e:
            print("Error in repo", repo.full_name, e)
EOF
          python list_commits.py

      - name: Run commit summary script (verbose)
        env:
          PERSONAL_GH_TOKEN: ${{ secrets.PERSONAL_GH_TOKEN }}
          ENTERPRISE_GH_URL: ${{ secrets.ENTERPRISE_GH_URL }}
          ENTERPRISE_GH_TOKEN: ${{ secrets.ENTERPRISE_GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: uv run src/get_commit_summary.py -u porwals --enterprise -e porwals@mskcc.org -v
